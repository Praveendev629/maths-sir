<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="240" r="120" fill="none" stroke="url(#accent)" stroke-width="12" opacity="0.6"/>
  <!-- Inner ring -->
  <circle cx="256" cy="240" r="80" fill="none" stroke="url(#accent)" stroke-width="8"/>
  <!-- Lens center -->
  <circle cx="256" cy="240" r="40" fill="url(#accent)" opacity="0.8"/>
  <!-- Lens highlight -->
  <circle cx="242" cy="226" r="14" fill="url(#glow)" opacity="0.6"/>
  <!-- AR corners - top left -->
  <path d="M116 160 L116 130 L146 130" fill="none" stroke="url(#glow)" stroke-width="6" stroke-linecap="round"/>
  <!-- AR corners - top right -->
  <path d="M396 160 L396 130 L366 130" fill="none" stroke="url(#glow)" stroke-width="6" stroke-linecap="round"/>
  <!-- AR corners - bottom left -->
  <path d="M116 320 L116 350 L146 350" fill="none" stroke="url(#glow)" stroke-width="6" stroke-linecap="round"/>
  <!-- AR corners - bottom right -->
  <path d="M396 320 L396 350 L366 350" fill="none" stroke="url(#glow)" stroke-width="6" stroke-linecap="round"/>
  <!-- AR scan lines -->
  <line x1="170" y1="240" x2="200" y2="240" stroke="url(#glow)" stroke-width="3" opacity="0.5"/>
  <line x1="312" y1="240" x2="342" y2="240" stroke="url(#glow)" stroke-width="3" opacity="0.5"/>
  <!-- Text -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#glow)">AR</text>
  <text x="256" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8">VIDEO</text>
</svg>
