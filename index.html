<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AR Video">
    <meta name="description"
        content="Augmented Reality Video Experience - Point your camera at the target image to play video">
    <title>AR Video Experience</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
    <!-- Custom Camera Permission Screen -->
    <div id="camera-permission-screen" class="permission-screen">
        <div class="permission-card">
            <div class="permission-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                    <circle cx="12" cy="13" r="4" />
                </svg>
            </div>
            <h2 class="permission-title">Camera Access Required</h2>
            <p class="permission-desc">This AR experience needs your camera to detect the target image and overlay video
                content.</p>
            <div class="permission-buttons">
                <button id="btn-allow-camera" class="btn-allow">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                    Allow Camera
                </button>
                <button id="btn-deny-camera" class="btn-deny">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                    Deny
                </button>
            </div>
        </div>
    </div>

    <div id="loading-container" class="loading-container hidden">
        <div class="loader"></div>
        <p id="loading-text">Initializing AR...</p>
    </div>

    <div id="instruction-container" class="instruction-container hidden">
        <p id="instruction-text">Point your camera at the target image</p>
    </div>

    <div id="permission-error" class="error-container hidden">
        <div class="error-content">
            <h3>Camera Access Required</h3>
            <p id="error-message">Please enable camera access to use this application.</p>
        </div>
    </div>

    <div id="ar-container"></div>

    <div class="credit">Made by <span class="credit-name">Praveen</span></div>

    <video id="ar-video" src="assets/video.mp4" crossorigin="anonymous" loop playsinline style="display: none;">
    </video>

    <script src="script.js"></script>
</body>

</html>
